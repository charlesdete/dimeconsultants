name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      # Optional: only run if you have test files
      - name: Run tests with Vitest
        run: |
          if ls src/**/*.test.* 1> /dev/null 2>&1; then
            npx vitest run
          else
            echo "No test files found, skipping tests"
          fi

      - name: Build app
        run: npm run build

  docker-build:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push production image
        run: |
          docker build -f Dockerfile.prod -t ${{ secrets.DOCKERHUB_USERNAME }}/ai-navigator-frontend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ai-navigator-frontend:latest
