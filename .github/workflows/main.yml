name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  # Step 1: Build and test
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (include dev)
        run: npm ci --include=dev

      - name: Run tests with Vitest
        run: npx vitest run

      - name: Build app
        run: npm run build

  # Step 2: Build and push Docker image (only if tests pass)
  docker-build:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push production image
        run: |
          docker build -f Dockerfile.prod -t ${{ secrets.DOCKERHUB_USERNAME }}/ai-navigator-frontend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ai-navigator-frontend:latest
