name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # GitHub Container Registry — no Docker Hub account needed
  # Image will be at: ghcr.io/<your-github-username>/ai-navigator-frontend
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ai-navigator-frontend

# Required for GHCR push and SSH deploy
permissions:
  contents: read
  packages: write   # allows pushing to ghcr.io

jobs:
  # ===========================================================================
  # JOB 1 — Build & Test
  # ===========================================================================
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run tests
        run: |
          if ls src/**/*.test.* 1>/dev/null 2>&1 || ls src/**/*.spec.* 1>/dev/null 2>&1; then
            npx vitest run --reporter=verbose
          else
            echo "No test files found, skipping tests"
          fi

      - name: Build app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/          # change to 'build/' if using Create React App
          retention-days: 1

  # ===========================================================================
  # JOB 2 — Docker Build & Push to GHCR
  # Uses the built-in GITHUB_TOKEN — no Docker Hub login required
  # Only runs on push to main (not on pull requests)
  # ===========================================================================
  docker-build:
    name: Docker Build & Push (GHCR)
    needs: build-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # ← built-in, no setup needed

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # JOB 3 — Deploy to Server
  # SSHs into your server, pulls from GHCR and restarts containers
  # ===========================================================================
  deploy:
    name: Deploy to dimeconsultants.africa
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     22
          script: |
            set -e

            echo "→ Logging into GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u "${{ github.actor }}" --password-stdin

            echo "→ Pulling latest image from GHCR..."
            docker pull ${{ env.IMAGE_NAME }}:latest

            echo "→ Navigating to app directory..."
            cd /opt/dime-consultants        # change to your actual deploy path

            echo "→ Restarting containers..."
            docker compose pull
            docker compose up -d --remove-orphans

            echo "→ Cleaning up old images..."
            docker image prune -f

            echo "✓ Deployment complete — dimeconsultants.africa is live!"
